<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex, nofollow" />
    <title>Web Clipper</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <meta name="theme-color" content="#262427" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300..800;1,9..40,300..800&family=Outfit:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
  </head>
  <body class="antialiased">
    <script>
      // Prevent FOUC: apply dark class before first paint
      (function () {
        var t = localStorage.getItem("theme");
        if (
          t === "dark" ||
          ((!t || t === "system") && matchMedia("(prefers-color-scheme:dark)").matches)
        )
          document.documentElement.classList.add("dark");
      })();
    </script>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
