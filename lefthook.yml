pre-commit:
  parallel: true
  jobs:
    - name: secretlint
      run: pnpm secretlint

    - name: oxlint
      run: pnpm lint

    - name: oxfmt-check
      run: pnpm format:check

    - name: test
      run: pnpm test

    - name: textlint
      run: pnpm textlint "**/*.md"

    - name: typecheck
      run: pnpm typecheck

prepare-commit-msg:
  jobs:
    - name: add-co-author-on-web
      run: |
        if [ "$CLAUDE_CODE_REMOTE" = "true" ] \
          && [ -n "$GIT_CO_AUTHOR_NAME" ] \
          && [ -n "$GIT_CO_AUTHOR_EMAIL" ] \
          && ! grep -q "Co-authored-by: $GIT_CO_AUTHOR_NAME" {1}; then
          printf "\nCo-authored-by: %s <%s>\n" "$GIT_CO_AUTHOR_NAME" "$GIT_CO_AUTHOR_EMAIL" >> {1}
        fi
