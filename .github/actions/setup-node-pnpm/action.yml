name: Setup Node.js & pnpm
description: Checkout, setup pnpm/Node.js, and install dependencies

runs:
  using: composite
  steps:
    - uses: pnpm/action-setup@v4

    - uses: actions/setup-node@v4
      with:
        node-version: 22
        cache: pnpm

    - run: pnpm install --frozen-lockfile
      shell: bash
